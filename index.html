<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Name Place Animal Things</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <div id="homeScreen" class="home-screen">
        <div class="home-card">
          <h1>Name, Place, Animal, Things</h1>
          <input id="playerName" type="text" placeholder="Enter your name" />
          <div class="home-buttons">
            <button onclick="createParty()">Create Party</button>
            <button class="secondary" onclick="joinParty()">Join Party</button>
          </div>
        </div>
      </div>

      <div id="gameScreen" class="game-screen hidden">
        <div class="topbar">
          <div>
            <div class="label">Party Code</div>
            <div id="partyCode" class="party-code"></div>
          </div>
          <div>
            <div class="label">Turn</div>
            <div id="turnText" class="turn-text"></div>
          </div>
        </div>

        <div class="controls">
          <div class="letter-box">
            <span>Letter:</span>
            <strong id="selectedLetter">-</strong>
          </div>
          <button onclick="startRound()">Start Round</button>
          <button class="secondary" onclick="stopRound()">Stop</button>
          <button class="secondary" onclick="addDemoPlayer()">Add Demo Player</button>
        </div>

        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>Player</th>
                <th>Name</th>
                <th>Place</th>
                <th>Animal</th>
                <th>Things</th>
                <th>Points</th>
              </tr>
            </thead>
            <tbody id="gameTableBody"></tbody>
          </table>
        </div>

        <div class="letters" id="letters"></div>

        <div class="history-section">
          <h2>Previous Rounds</h2>
          <div id="roundHistory"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
